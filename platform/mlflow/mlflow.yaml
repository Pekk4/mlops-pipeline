apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlflow
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default
  source:
    repoURL: https://community-charts.github.io/helm-charts
    chart: mlflow
    targetRevision: 1.8.1
    helm:
      values: |
        backendStore:
          databaseMigration: true
          postgres:
            enabled: true
            host: postgres-postgresql
            port: 5432
            database: postgres
            user: postgres
            password: postgres

        artifactRoot:
          s3:
            enabled: true
            bucket: mlflow
            awsAccessKeyId: minioadmin
            awsSecretAccessKey: minioadmin

        extraEnvVars:
          MLFLOW_S3_ENDPOINT_URL: "http://minio.minio.svc.cluster.local:9000"
          MLFLOW_SERVER_ALLOWED_HOSTS: "mlflow.local,mlflow.mlflow.svc.cluster.local"
          MLFLOW_SERVER_CORS_ALLOWED_ORIGINS: "http://mlflow.local,http://mlflow.mlflow.svc.cluster.local"

        serviceMonitor:
          enabled: true

        ingress:
          enabled: true
          className: traefik
          annotations: {}
          hosts:
            - host: mlflow.local
              paths:
                - path: /
                  pathType: Prefix
          tls: []
  destination:
    server: https://kubernetes.default.svc
    namespace: mlflow
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
