apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kserve-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "40"
spec:
  project: default
  source:
    repoURL: ghcr.io/kserve/charts
    chart: kserve
    targetRevision: v0.16.0
    helm:
      releaseName: kserve
      values: |
        manager:
          enabled: true
          webhook:
            enabled: true
        webhook:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kserve
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
