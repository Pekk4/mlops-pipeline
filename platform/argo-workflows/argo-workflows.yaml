apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2000"
spec:
  project: default

  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-workflows
    targetRevision: 0.47.4
    helm:
      releaseName: argo-workflows
      valuesObject:
        controller:
          workflowNamespaces:
            - ml-workflows
          rbac:
            create: true
          serviceAccount:
            create: true
            name: argo-workflow-controller

        workflow:
          serviceAccount:
            create: true
            name: argo-workflow
          defaults:
            spec:
              serviceAccountName: argo-workflow
          rbac:
            create: true

        server:
          secure: false
          authMode: server
          sso:
            enabled: false
          ingress:
            enabled: true
            className: traefik
            hosts:
              - argo.local
            paths:
              - /

        artifactRepository:
          s3:
            bucket: argo-artifacts
            endpoint: minio.minio.svc.cluster.local:9000
            insecure: true
            accessKeySecret:
              name: minio-creds
              key: accesskey
            secretKeySecret:
              name: minio-creds
              key: secretkey

  destination:
    server: https://kubernetes.default.svc
    namespace: argo-workflows

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true